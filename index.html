<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروحتي ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#login{
width:90%;
max-width:350px;
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px hotpink;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:20px;
font-size:18px;
text-align:center;
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ff2d75;
color:white;
font-size:18px;
cursor:pointer;
}

#page{
display:none;
text-align:center;
padding:20px;
}

h1{
font-size:45px;
margin-bottom:20px;
color:pink;
}

 .photo{
  width:220px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px hotpink;
}   
 
</style>

</head>

<body>


<div id="login">
<img src="8B7B2D78-AE62-471C-992D-7CB1009863D7.png" class="photo">
  <h1>❤️ فروحتي ❤️</h1>

<p>ادخلي كلمة السر</p>

<input id="pass" type="password">

<button onclick="check()">دخول</button>

</div>

<div id="page">

<h1>أهلاً فروحتي ❤️</h1>

<p>تم الدخول بنجاح</p>

</div>

<script>

function check(){

let p=document.getElementById("pass").value;

if(p=="1y11f139"){

document.getElementById("login").style.display="none";

document.getElementById("page").style.display="block";

}else{

alert("كلمة السر غير صحيحة");

}

}

</script>

</body>
</html>
